<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanctum Pool — Compliant Privacy on Stellar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="root" id="root">
      <div class="bg bg-grid"></div>
      <div class="bg bg-spot" id="bg-spot"></div>
      <div class="bg bg-spot-grid" id="bg-spot-grid"></div>
      <div class="bg bg-blob-a"></div>
      <div class="bg bg-blob-b"></div>

      <div class="wrap">
        <header class="topbar">
          <div class="brand">
            <span class="logo"><svg viewBox="0 0 100 100" width="22" height="22" aria-hidden="true"><path transform="translate(20.5,12) scale(0.63)" d="M72 34 C72 18 46 14 33 25 C21 35 24 52 44 60 C64 68 68 85 55 96 C42 107 22 102 18 86" fill="none" stroke="#04241B" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            <span class="name">Sanctum</span>
          </div>
          <nav class="nav" id="nav"></nav>
          <div class="spacer"></div>
          <div id="wallet-slot"></div>
        </header>

        <div class="panel-area"><div id="view" style="width:100%;display:flex;justify-content:center;"></div></div>
      </div>
    </div>
    <div class="toasts" id="toasts" aria-live="polite"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
